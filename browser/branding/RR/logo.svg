<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4d4d4;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#888888;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle (optional, remove for transparent) -->
  <!-- <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/> -->

  <!-- RR monogram — bold, centered -->
  <g filter="url(#shadow)">
    <!-- Outer silver border path (simplified monogram shape) -->
    <text
      x="256"
      y="320"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="280"
      font-weight="900"
      text-anchor="middle"
      fill="none"
      stroke="url(#silverGrad)"
      stroke-width="18"
      stroke-linejoin="round"
      paint-order="stroke"
      letter-spacing="-30"
    >#RR</text>

    <!-- Main fill -->
    <text
      x="256"
      y="320"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="280"
      font-weight="900"
      text-anchor="middle"
      fill="#111111"
      letter-spacing="-30"
      filter="url(#glow)"
    >#RR</text>

    <!-- Silver highlight overlay -->
    <text
      x="256"
      y="320"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="280"
      font-weight="900"
      text-anchor="middle"
      fill="url(#silverGrad)"
      opacity="0.15"
      letter-spacing="-30"
    >#RR</text>
  </g>

  <!-- Sparkle accents (like the logo) -->
  <g fill="white" opacity="0.9" filter="url(#glow)">
    <polygon points="480,80 484,92 496,96 484,100 480,112 476,100 464,96 476,92" />
    <polygon points="40,380 43,388 51,391 43,394 40,402 37,394 29,391 37,388" />
  </g>
</svg>
